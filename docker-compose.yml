version: "3.3"
services:
  x3:
    restart: always
    container_name: x3
    image: x3
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - X3_GOTENBERG_URL=http://gotenberg:3000
    depends_on:
      - gotenberg
  gotenberg:
    restart: always
    image: gotenberg/gotenberg:8
    container_name: x3-gotenberg
